name: Stock Report Bot

on:
  schedule:
    # 한국 시간 기준 매일 오전 07:30 (UTC 22:30) 전송
    - cron: '30 22 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "numpy<2.0.0" pandas==2.0.3 finance-datareader openpyxl python-telegram-bot requests lxml

      # [국장 1단계] 코스피 수집 및 전송
      - name: Run KOSPI Report
        run: python bot_kospi.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Wait for Bypass
        run: sleep 30

      # [국장 2단계] 코스닥 수집 및 전송
      - name: Run KOSDAQ Report
        run: python bot_kosdaq.py
        env:
          PYTHONIOENCODING: utf-8

      # 미국장 및 ETF (기존 유지)
      - name: Run US Stock Bot
        run: python us_bot.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run US ETF Bot
        run: python us_etf_bot.py
        env:
          PYTHONIOENCODING: utf-8
