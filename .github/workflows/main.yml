name: Stock Report Bot

on:
  schedule:
    # 한국 시간 기준 매일 오전 07:30 (UTC 22:30) 전송
    - cron: '30 22 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 데이터 수집 핵심 라이브러리 설치
          pip install "numpy<2.0.0" 
          pip install pandas==2.0.3 
          pip install yfinance          # 추가: 현재 가장 안정적인 수집 엔진
          pip install yahooquery
          pip install finance-datareader 
          pip install openpyxl 
          pip install python-telegram-bot 
          pip install requests lxml beautifulsoup4

      # [국장 통합본] 지수님 스타일의 코스피 & 코스닥 수집 및 전송
      - name: Run Korea Stock Bot
        run: python bot.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Wait for US Market
        run: sleep 10

      # 미국장 (기존 유지)
      - name: Run US Stock Bot
        run: python us_bot.py

      # 미국 ETF (기존 유지)
      - name: Run US ETF Bot
        run: python us_etf_bot.py
