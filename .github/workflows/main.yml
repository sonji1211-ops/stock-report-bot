name: Stock Report Bot

on:
  schedule:
    # 한국 시간 기준 매일 오전 07:30 (UTC 22:30) 전송
    - cron: '30 22 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 공공데이터 API 방식에 필요한 가벼운 라이브러리 위주로 재구성
          pip install pandas==2.0.3 
          pip install openpyxl 
          pip install python-telegram-bot 
          pip install requests 
          # 미국장/ETF용 (필요하다면 유지)
          pip install yfinance

      - name: Run Korea Stock Bot (Government API)
        run: python bot.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Wait for US Market
        run: sleep 10

      - name: Run US Stock Bot
        run: python us_bot.py

      - name: Run US ETF Bot
        run: python us_etf_bot.py
