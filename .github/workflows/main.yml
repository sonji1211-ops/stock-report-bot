name: Stock Report Bot

on:
  schedule:
    # 한국 시간 기준 매일 오전 07:30 (UTC 22:30) 전송
    - cron: '30 23 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 국장/미장/ETF 봇 모두가 사용하는 라이브러리 합본
          pip install "numpy<2.0.0"
          pip install "pandas<2.1.0"
          pip install openpyxl python-telegram-bot requests yfinance
          # [중요] ETF 봇이 사용하는 라이브러리 추가
          pip install finance-datareader lxml beautifulsoup4

      - name: Run Korea Stock Bot
        run: python bot.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run US Stock Bot
        run: python us_bot.py

      - name: Run US ETF Bot
        run: python us_etf_bot.py
